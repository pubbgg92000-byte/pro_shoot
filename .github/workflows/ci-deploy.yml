name: Build and Deploy
run-name: ${{ github.event_name == 'workflow_dispatch' && 'Manual production deploy' || format('Build and deploy {0}', github.ref_name) }}

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy production from the selected branch
        required: true
        default: production
        type: choice
        options:
          - production

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Vercel Production
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel configuration
        run: npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel output
        run: npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production output
        id: deploy
        run: |
          DEPLOYMENT_URL="$(npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"
          echo "Production deployment: ${DEPLOYMENT_URL}"
